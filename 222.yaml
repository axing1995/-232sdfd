rules:
  # 私有IP直连（不产生流量，本地局域网）
  - RULE-SET,private_ip,流量直连,no-resolve
  
  # UDP 全部丢弃（避免任何真实流量）
  - NETWORK,UDP,流量拦截
  
  # 域名关键词规则（国内）
  - DOMAIN-KEYWORD,xn--ngstr-lra8j.com,国内选择
  - DOMAIN-KEYWORD,services.googleapis.cn,国内选择
  
  # 端口受限处理（TCP）
  - AND,((NETWORK,TCP),(DST-PORT,446/30443),(RULE-SET,cn_domain)),端口受限
  - AND,((NETWORK,TCP),(DST-PORT,446/30443),(RULE-SET,cn_ip)),端口受限  
  
  # 国外域名 → 国外选择（节点自带 dialer-proxy 百度直连）
  - RULE-SET,twitter_domain,国外选择
  - RULE-SET,youtube_domain,国外选择
  - RULE-SET,google_domain,国外选择
  - RULE-SET,telegram_domain,国外选择
  
  # 国外IP
  - RULE-SET,google_ip,国外选择,no-resolve
  - RULE-SET,netflix_ip,国外选择,no-resolve
  - RULE-SET,telegram_ip,国外选择,no-resolve
  - RULE-SET,twitter_ip,国外选择,no-resolve
  
  # 国外地理位置
  - RULE-SET,geolocation-!cn,国外选择
  
  # 国内域名/IP → 国内选择（走百度直连）
  - 规则集,cn_domain,国内选择
规则集,cn_ip,国内选择,不解析
  
  # 兜底
  - 匹配,漏网之鱼

